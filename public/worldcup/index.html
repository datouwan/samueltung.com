<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Map, Groups & Live Scores</title>
<meta name="description" content="Interactive world map of all 48 nations qualified for the FIFA World Cup 2026, with live group standings and the current live game and score." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='10' fill='%23a14a32'/></svg>" />

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<style>
  :root{
    --paper:#faf9f6; --paper-2:#f3f1ea; --ink:#1c1b19; --ink-soft:#3b3934; --muted:#807b72;
    --line:#e6e2d8; --accent:#a14a32; --accent-ink:#8a3d28; --live:#d6422b; --go:#1f9d6b;
    --card:#fff; --legend:rgba(255,255,255,.96); --img-bg:#e9e6df; --map-bg:#eef0f2;
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --c-host:#a14a32; --c-uefa:#2f6f9f; --c-conmebol:#1f9d6b;
    --c-caf:#c98a1e; --c-afc:#7a52a8; --c-concacaf:#c4543f; --c-ofc:#3aa0a8;
    color-scheme:light;
  }
  html[data-theme="dark"]{
    --paper:#15130f; --paper-2:#211d17; --ink:#f1ece3; --ink-soft:#cfc8bb; --muted:#928b80;
    --line:#332e26; --accent:#cf7053; --accent-ink:#e29173; --live:#f0654d; --go:#39c08a;
    --card:#1d1a15; --legend:rgba(29,26,21,.94); --img-bg:#2a251e; --map-bg:#0e0d0b;
    --c-uefa:#5b97c4; --c-conmebol:#39c08a; --c-caf:#e0ad55; --c-afc:#a888d6;
    --c-concacaf:#e07a64; --c-ofc:#5fc3cb;
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.6 var(--sans);-webkit-font-smoothing:antialiased}

  header.bar{padding:18px 22px 14px;border-bottom:1px solid var(--line);background:var(--paper)}
  header.bar .role{color:var(--accent-ink);font-weight:600;letter-spacing:.04em;font-size:12px;
    text-transform:uppercase;margin:0 0 4px}
  header.bar h1{font-family:var(--serif);font-weight:600;font-size:26px;line-height:1.1;margin:0;letter-spacing:-.01em}
  header.bar h1 .sub{color:var(--muted);font-family:var(--sans);font-weight:500;font-size:14px;margin-left:8px}
  header.bar .back{float:right;font-size:13px;color:var(--muted);text-decoration:none}
  header.bar .back:hover{color:var(--accent)}

  /* live banner */
  #liveBar{position:sticky;top:0;z-index:600;background:#1c1b19;color:#fff;
    border-bottom:1px solid #000;min-height:46px;display:flex;align-items:center;gap:14px;
    padding:8px 16px;overflow-x:auto;scrollbar-width:thin}
  #liveBar .tag{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;
    letter-spacing:.06em;text-transform:uppercase;color:#ffb3a6;white-space:nowrap}
  #liveBar .dot{width:9px;height:9px;border-radius:50%;background:var(--live);
    box-shadow:0 0 0 0 rgba(214,66,43,.7);animation:pulse 1.5s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(214,66,43,.7)}70%{box-shadow:0 0 0 9px rgba(214,66,43,0)}100%{box-shadow:0 0 0 0 rgba(214,66,43,0)}}
  .lgame{display:inline-flex;align-items:center;gap:8px;white-space:nowrap;font-size:14px}
  .lgame .tcard{display:inline-flex;align-items:center;gap:6px;background:#2a2826;border:1px solid #3a3733;
    border-radius:9px;padding:3px 9px;color:#fff;transition:border-color .15s}
  .lgame .tcard img{width:20px;height:14px;object-fit:contain;border-radius:2px;background:#fff}
  .lgame .tcard .cn{font-weight:600}
  .kit{flex:0 0 auto;filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
  .lgame .sc{font-family:var(--serif);font-weight:700;font-size:16px;padding:0 2px;letter-spacing:.02em}
  .lgame .min{color:#ffb3a6;font-size:11px;font-weight:700;margin-left:2px}
  .lgame .grp{color:#9c968c;font-size:11px;margin-left:2px}
  .goalbadge{font-size:11px;font-weight:800;letter-spacing:.04em;color:#06351a;background:#7CFF9B;
    border-radius:10px;padding:2px 8px;margin-left:2px;animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .lgame.goal .sc{animation:scoreflash .9s ease-in-out 3}
  @keyframes scoreflash{0%,100%{color:#fff;transform:scale(1)}50%{color:#7CFF9B;transform:scale(1.18)}}
  .live-score-pill.goal{animation:pillflash .9s ease-in-out 3}
  @keyframes pillflash{0%,100%{border-color:var(--live);box-shadow:0 4px 14px rgba(0,0,0,.4)}
    50%{border-color:#7CFF9B;box-shadow:0 0 0 4px rgba(124,255,155,.55)}}
  #liveBar.idle{background:var(--paper-2);color:var(--ink-soft);border-bottom:1px solid var(--line)}
  #liveBar.idle .tag{color:var(--muted)}

  /* live bar */
  .livewrap{position:relative;display:flex;align-items:stretch}
  .livewrap #liveBar{flex:1;min-width:0}

  /* finals strip: completed games, below the map and above the tabs */
  #finalsBar{background:#1c1b19;color:#fff;border-top:1px solid #000;border-bottom:1px solid #000;
    min-height:46px;display:flex;align-items:center;gap:14px;padding:8px 16px;overflow-x:auto;scrollbar-width:thin}
  #finalsBar[hidden]{display:none}
  #finalsBar .seg{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:#9c968c;white-space:nowrap}

  /* venue chip in the live bar */
  .vchip{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#ffd9a8;
    background:#3a2f26;border:1px solid #574536;border-radius:8px;padding:3px 8px;cursor:pointer;white-space:nowrap}
  .vchip:hover{border-color:#a14a32;color:#fff}

  /* stadium marker on map */
  .stadium-marker{width:30px;height:30px;display:grid;place-items:center;font-size:18px;cursor:pointer;
    background:#fff;border:2px solid #a14a32;border-radius:50%;box-shadow:0 3px 10px rgba(0,0,0,.35);
    animation:spop 1.6s ease-in-out infinite}
  @keyframes spop{0%,100%{box-shadow:0 3px 10px rgba(0,0,0,.35),0 0 0 0 rgba(161,74,50,.5)}
    60%{box-shadow:0 3px 10px rgba(0,0,0,.35),0 0 0 12px rgba(161,74,50,0)}}

  /* map view toggle (Teams / Stadiums) */
  .viewtoggle{display:flex;overflow:hidden;border-radius:7px;box-shadow:0 1px 6px rgba(0,0,0,.32);border:1px solid var(--line)}
  .viewtoggle .vt-btn{appearance:none;border:none;background:var(--card);color:var(--ink-soft);
    font:700 12px var(--sans);padding:7px 13px;cursor:pointer;line-height:1.2;letter-spacing:.02em}
  .viewtoggle .vt-btn+.vt-btn{border-left:1px solid var(--line)}
  .viewtoggle .vt-btn:hover{background:var(--paper-2)}
  .viewtoggle .vt-btn.active{background:var(--accent);color:#fff}

  /* stadium-only view markers */
  .smk{transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;cursor:pointer;width:max-content}
  .smk-pin{width:28px;height:28px;display:grid;place-items:center;font-size:15px;background:#fff;
    border:2px solid var(--accent);border-radius:50%;box-shadow:0 3px 8px rgba(0,0,0,.3);transition:transform .12s}
  .smk-nm{margin-top:3px;font:700 10px var(--sans);color:var(--ink);background:var(--legend);
    border:1px solid var(--line);border-radius:5px;padding:1px 5px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .smk:hover .smk-pin{transform:scale(1.14);border-color:var(--accent-ink)}
  .live-stadium{z-index:1300!important}
  .live-stadium .smk-pin{border-color:var(--live);
    box-shadow:0 3px 8px rgba(0,0,0,.3),0 0 0 0 rgba(214,66,43,.6);animation:mpulse 1.4s infinite}
  .live-stadium .smk-nm{border-color:var(--live);color:var(--live)}

  /* clickable player names */
  .plink{cursor:pointer;display:inline-flex;align-items:center;gap:9px;min-width:0}
  .ptable .plink:hover .pnm,.hpl:hover .hnm{color:var(--accent)}
  .plink:hover .pnm,.plink:hover .hnm{text-decoration:underline;text-decoration-color:var(--accent)}

  /* player floating window */
  .pbox{width:min(380px,100%)}
  .pphoto{height:230px;background:var(--paper-2) center/contain no-repeat}
  .pphoto.noimg{display:grid;place-items:center}
  .pphoto.noimg::after{content:'👤';font-size:64px;opacity:.35}
  .pinfo{padding:16px 20px 20px}
  .pinfo h3{font-family:var(--serif);font-size:22px;margin:0 0 3px}
  .ploc{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  .pstats{display:flex;gap:10px;flex-wrap:wrap}
  .pclubs{margin-top:14px}
  .pclubs[hidden]{display:none}
  .pchead{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    margin-bottom:4px;border-top:1px solid var(--line);padding-top:12px}
  .pcrow{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13.5px;border-bottom:1px solid var(--paper-2)}
  .pcrow:last-child{border-bottom:none}
  .pcrow img{width:18px;height:18px;object-fit:contain;flex:0 0 auto}
  .pcdot{width:18px;height:18px;border-radius:50%;background:var(--paper-2);flex:0 0 auto}
  .pcn{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pcy{color:var(--muted);font-size:12px;white-space:nowrap}
  .pstat{flex:1;min-width:84px;background:var(--paper-2);border-radius:10px;padding:10px 12px;
    display:flex;flex-direction:column;font-size:11px;color:var(--muted);line-height:1.3}
  .pstat b{font-family:var(--serif);font-size:20px;color:var(--ink)}

  /* stadium floating window */
  .smodal{position:fixed;inset:0;z-index:2000;background:rgba(20,18,16,.55);
    display:grid;place-items:center;padding:20px;backdrop-filter:blur(2px)}
  .smodal[hidden]{display:none}
  .sbox{position:relative;width:min(440px,100%);max-height:90vh;overflow:auto;background:var(--card);border-radius:16px;
    box-shadow:0 24px 70px rgba(0,0,0,.4);animation:pop .25s ease}
  .sclose{position:absolute;top:10px;right:10px;z-index:2;width:32px;height:32px;border:none;border-radius:50%;
    background:rgba(0,0,0,.5);color:#fff;font-size:20px;line-height:1;cursor:pointer}
  .sclose:hover{background:rgba(0,0,0,.75)}
  .simg{height:200px;background:var(--img-bg) center/cover no-repeat}
  .simg.noimg{display:grid;place-items:center}
  .simg.noimg::after{content:'🏟️';font-size:54px;opacity:.5}
  .sbody{padding:16px 20px 20px}
  .sbody h3{font-family:var(--serif);font-size:22px;margin:0 0 2px}
  .sloc{color:var(--muted);margin:0 0 14px;font-size:14px}
  .sstats{display:flex;gap:10px;margin-bottom:12px}
  .sstats .stat{flex:1;background:var(--paper-2);border-radius:10px;padding:10px 12px;
    display:flex;flex-direction:column;font-size:12px;color:var(--muted)}
  .sstats .stat b{font-family:var(--serif);font-size:18px;color:var(--ink)}
  .smatch{margin:0;font-size:14px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:12px}
  .smatch .ld{color:var(--live)}
  .smatch b{font-family:var(--serif)}
  .sscorers{margin-top:10px}
  .schead{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    margin:0 0 6px;border-top:1px solid var(--line);padding-top:12px}
  .scrow{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13.5px;flex-wrap:wrap}
  .scmin{color:var(--accent);font-weight:700;min-width:36px}
  .scname{font-weight:600;cursor:pointer}
  .scname:hover{color:var(--accent);text-decoration:underline}
  .scteam{color:var(--muted);font-size:12px}
  .sctag{font-size:9px;font-weight:800;background:var(--paper-2);border-radius:6px;padding:1px 5px;color:var(--muted)}
  .scasst{color:var(--muted);font-size:11.5px}
  .scempty,.scload{color:var(--muted);font-size:13px;padding:2px 0}

  #map{height:54vh;min-height:340px;background:var(--map-bg)}

  /* groups */
  .groups-wrap{max-width:1180px;margin:0 auto;padding:28px 20px 48px}
  /* tabs */
  .tabs{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:0 0 18px;border-bottom:1px solid var(--line)}
  .tab{appearance:none;background:none;border:none;font:600 16px var(--sans);color:var(--muted);
    padding:9px 2px;margin-right:22px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--ink-soft)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tabs .upd{margin-left:auto;color:var(--muted);font-size:13px}
  .tabpane[hidden]{display:none}

  /* schedule */
  .sched{max-width:760px}
  .sday{margin:0 0 8px;padding-top:18px;font-family:var(--serif);font-size:15px;font-weight:600;
    color:var(--ink-soft);border-top:1px solid var(--line)}
  .sday:first-child{padding-top:0;border-top:none}
  .smatchlist{display:grid;gap:8px;margin-bottom:6px}
  .srow{position:relative;display:grid;grid-template-columns:54px 1fr auto 1fr 70px;align-items:center;gap:10px;
    border:1px solid var(--line);border-radius:11px;background:var(--card);padding:9px 13px;
    cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s}
  .srow:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 8px 22px rgba(28,27,25,.06)}
  .srow.live{border-color:var(--live);box-shadow:0 4px 16px rgba(214,66,43,.18)}
  .srow.next{border-color:var(--accent);box-shadow:0 4px 16px rgba(161,74,50,.16)}
  .sflag{position:absolute;top:-8px;right:12px;z-index:2;font:800 9px var(--sans);letter-spacing:.06em;
    text-transform:uppercase;padding:2px 8px;border-radius:9px;line-height:1.35;color:#fff;
    display:inline-flex;align-items:center;gap:4px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .sflag.live{background:var(--live)}
  .sflag.next{background:var(--accent)}
  .sstat.nx{color:var(--accent);font-weight:800}
  .srow .stime{font-size:12px;font-weight:700;color:var(--muted);line-height:1.2}
  .srow .stime .sgrp{display:block;font-size:10px;font-weight:600;color:var(--accent-ink);margin-top:2px}
  .srow .sh{display:flex;align-items:center;gap:8px;min-width:0;justify-content:flex-end;text-align:right}
  .srow .sa{display:flex;align-items:center;gap:8px;min-width:0}
  .srow .sh .snm,.srow .sa .snm{font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srow img.screst{width:22px;height:16px;object-fit:contain;flex:0 0 auto}
  .srow .sscore{font-family:var(--serif);font-weight:700;font-size:16px;text-align:center;white-space:nowrap;min-width:46px}
  .srow .sscore .svs{color:var(--muted);font-family:var(--sans);font-weight:600;font-size:12px}
  .srow .sstat{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;text-align:right;
    color:var(--muted);white-space:nowrap}
  .srow .sstat.lv{color:var(--live)}
  @media(max-width:560px){.srow{grid-template-columns:46px 1fr auto 1fr;gap:7px;padding:8px 10px}
    .srow .sstat{display:none}.srow .snm{font-size:12.5px}}

  /* news */
  .newslist{display:grid;gap:10px;max-width:760px}
  .narti{display:block;text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:11px;
    background:var(--card);padding:12px 15px;transition:border-color .15s,transform .15s,box-shadow .15s}
  .narti:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 8px 22px rgba(28,27,25,.06)}
  .narti .nt{font-weight:600;font-size:15.5px;line-height:1.35}
  .narti .nm{color:var(--muted);font-size:12.5px;margin-top:5px}
  .narti .nm b{color:var(--accent-ink);font-weight:600}

  /* player search */
  .psearch{display:flex;gap:8px;margin:0 0 16px;max-width:520px}
  .psearch input{flex:1;min-width:0;border:1px solid var(--line);border-radius:10px;background:var(--card);
    color:var(--ink);font:15px var(--sans);padding:10px 14px}
  .psearch input:focus{outline:none;border-color:var(--accent)}
  .psearch button{flex:0 0 auto;border:none;border-radius:10px;background:var(--accent);color:#fff;
    font:600 14px var(--sans);padding:0 18px;cursor:pointer}
  .psearch button:hover{background:var(--accent-ink)}
  .psr{max-width:520px;margin:-8px 0 16px;border:1px solid var(--line);border-radius:12px;background:var(--card);
    overflow:hidden;box-shadow:0 10px 30px rgba(28,27,25,.10)}
  .psr[hidden]{display:none}
  .psr-msg{padding:12px 14px;color:var(--muted);font-size:13.5px}
  .psr-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;cursor:pointer;
    background:none;padding:9px 13px;border-bottom:1px solid var(--paper-2);color:var(--ink)}
  .psr-item:last-child{border-bottom:none}
  .psr-item:hover{background:var(--paper-2)}
  .psr-item img{width:38px;height:38px;object-fit:cover;border-radius:50%;background:var(--paper-2);flex:0 0 auto}
  .psr-ph{width:38px;height:38px;display:grid;place-items:center;border-radius:50%;background:var(--paper-2);flex:0 0 auto;font-size:18px}
  .psr-txt{display:flex;flex-direction:column;min-width:0;line-height:1.25}
  .psr-txt b{font-weight:600;font-size:14.5px}
  .psr-txt small{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pextract{margin:14px 0 0;font-size:13.5px;line-height:1.55;color:var(--ink-soft)}
  .pwiki{display:inline-block;margin-top:10px;font-size:13px;font-weight:600;color:var(--accent);text-decoration:none}
  .pwiki[hidden]{display:none}
  .pwiki:hover{text-decoration:underline}

  /* player stats */
  .substabs{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}
  .stab{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    font:600 13px var(--sans);padding:6px 14px;border-radius:20px;cursor:pointer;transition:.15s}
  .stab:hover{border-color:var(--accent)}
  .stab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .statnote{color:var(--muted);font-size:12.5px;margin:0 0 12px;max-width:580px}

  .ptable{width:100%;max-width:560px;border-collapse:collapse;background:var(--card);
    border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .ptable th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);
    padding:10px 8px;text-align:center;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
  .ptable th.plh,.ptable th.rkh{cursor:default}.ptable th.plh{text-align:left}
  .ptable th.on{color:var(--accent)}
  .ptable td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--paper-2);font-weight:600}
  .ptable tr:last-child td{border-bottom:none}
  .ptable td.on{color:var(--accent)}
  .ptable td.rk{color:var(--muted)}
  .ptable td.pl{text-align:left}
  .ptable .pl{display:flex;align-items:center;gap:9px}
  .ptable .pf{width:26px;height:19px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px var(--line)}
  .ptable .pnm{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  .ptable .pnm small{color:var(--muted);font-weight:400;font-size:11.5px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ptable tr.lead td{background:linear-gradient(90deg,rgba(161,74,50,.10),transparent)}

  .histgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:1000px}
  .histcard{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:14px 16px}
  .histcard h4{margin:0;font-family:var(--serif);font-size:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .histcard .hn{margin:4px 0 0;color:var(--muted);font-size:11.5px}
  .rtag{font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
    background:var(--paper-2);border-radius:8px;padding:2px 7px}
  .rtag.live{color:#06351a;background:#7CFF9B}
  .hv .dlt{color:var(--accent);font-size:11px;font-weight:700;margin-left:3px}
  .rtable{width:100%;border-collapse:collapse;margin-top:8px;table-layout:fixed}
  .rtable td{padding:6px 0;border-bottom:1px solid var(--paper-2);vertical-align:middle}
  .rtable tr:last-child td{border-bottom:none}
  .rtable td.hrk{width:20px;text-align:center;color:var(--muted);font-weight:700;font-size:13px}
  .rtable td.hpl{padding-left:4px}
  .rtable .plink{display:flex;align-items:center;gap:8px}
  .rtable .pf{width:24px;height:17px;flex:0 0 auto;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px var(--line)}
  .rtable .hnm{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  .rtable .hnm{font-weight:600;font-size:13.5px}
  .rtable .hnm small{color:var(--muted);font-weight:400;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rtable td.hv{width:66px;text-align:right;font-family:var(--serif);font-size:17px;white-space:nowrap;line-height:1.05}
  .rtable td.hv small{font-family:var(--sans);font-weight:600;font-size:10px;color:var(--muted);display:block}

  /* live-bar segment labels + final/next chips */
  #liveBar .seg{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:#9c968c;padding-left:6px;border-left:1px solid #3a3733;margin-left:2px}
  #liveBar.idle .seg{color:var(--muted);border-left-color:var(--line)}
  .finalbadge{font-size:10px;font-weight:800;letter-spacing:.05em;color:#cfc8bb;background:#3a3733;
    border-radius:9px;padding:2px 7px;margin-left:2px}
  #liveBar.idle .finalbadge{background:var(--paper-2);color:var(--muted)}
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}

  .gcard{border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden;
    box-shadow:0 4px 16px rgba(28,27,25,.04)}
  .gcard.haslive{border-color:var(--live);box-shadow:0 6px 22px rgba(214,66,43,.16)}
  .gcard .gh{display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;background:var(--paper-2);border-bottom:1px solid var(--line)}
  .gcard .gh b{font-family:var(--serif);font-size:16px}
  .gcard .gh .livechip{font-size:10px;font-weight:800;letter-spacing:.05em;color:#fff;
    background:var(--live);border-radius:10px;padding:2px 7px;display:inline-flex;align-items:center;gap:4px}
  .gcard .gh .livechip .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
  table.std{width:100%;border-collapse:collapse;font-size:13px}
  table.std th{font-weight:600;color:var(--muted);font-size:10.5px;text-transform:uppercase;
    letter-spacing:.03em;text-align:center;padding:7px 4px;border-bottom:1px solid var(--line)}
  table.std th.tm{text-align:left;padding-left:12px}
  table.std td{padding:7px 4px;text-align:center;border-bottom:1px solid var(--paper-2)}
  table.std tr:last-child td{border-bottom:none}
  table.std td.tm{text-align:left;padding-left:10px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  table.std td.tm img{width:22px;height:16px;object-fit:contain;border-radius:2px}
  table.std td.tm .nm{overflow:hidden;text-overflow:ellipsis}
  table.std td.pts{font-weight:700;font-family:var(--serif);font-size:15px}
  table.std tr.adv td:first-child{box-shadow:inset 3px 0 0 var(--go)}
  table.std tr.adv .pos{color:var(--go);font-weight:700}
  .pos{display:inline-block;min-width:16px}

  .state-note{grid-column:1/-1;border:1px dashed var(--line);border-radius:12px;background:var(--card);
    padding:18px 20px;color:var(--ink-soft);font-size:14px}
  .state-note code{font-family:'SFMono-Regular',ui-monospace,Consolas,monospace;font-size:.86em;
    background:var(--paper-2);padding:1px 5px;border-radius:4px}

  /* map bits (unchanged) */
  .flag-marker{width:30px;height:21px;border-radius:3px;overflow:hidden;border:2px solid var(--mk,#888);
    background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25);transition:transform .12s}
  .flag-marker img{width:100%;height:100%;object-fit:cover;display:block}
  .flag-marker:hover{transform:scale(1.25);z-index:1000}
  .flag-marker.host{width:34px;height:24px;border-width:3px}
  /* live highlight on the two countries currently playing */
  .live-marker{z-index:1200!important}
  .live-marker .flag-marker{transform:scale(1.4);border-color:var(--live);
    box-shadow:0 0 0 3px rgba(214,66,43,.55),0 2px 8px rgba(0,0,0,.3);animation:mpulse 1.4s infinite}
  @keyframes mpulse{
    0%{box-shadow:0 0 0 3px rgba(214,66,43,.6),0 0 0 0 rgba(214,66,43,.5)}
    70%{box-shadow:0 0 0 3px rgba(214,66,43,.6),0 0 0 16px rgba(214,66,43,0)}
    100%{box-shadow:0 0 0 3px rgba(214,66,43,.6),0 0 0 0 rgba(214,66,43,0)}}
  .pill-wrap{transform:translate(-50%,-50%)}
  .live-score-pill{display:inline-flex;align-items:center;gap:5px;background:#1c1b19;color:#fff;
    border:1.5px solid var(--live);border-radius:20px;padding:4px 9px;white-space:nowrap;cursor:pointer;
    font:700 13px var(--sans);box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .live-score-pill img{width:18px;height:13px;object-fit:cover;border-radius:2px}
  .live-score-pill .sc{font-family:var(--serif);font-size:15px;letter-spacing:.02em}
  .live-score-pill .lv{font-size:9px;color:#ffb3a6;letter-spacing:.06em;margin-left:1px}
  .liveline{animation:dash 1s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-28}}
  .lgame.tap{cursor:pointer} .lgame.tap:hover .tcard{border-color:var(--live)}
  .conf-host{--mk:var(--c-host)} .conf-uefa{--mk:var(--c-uefa)} .conf-conmebol{--mk:var(--c-conmebol)}
  .conf-caf{--mk:var(--c-caf)} .conf-afc{--mk:var(--c-afc)} .conf-concacaf{--mk:var(--c-concacaf)} .conf-ofc{--mk:var(--c-ofc)}
  .leaflet-tooltip.team{background:#1c1b19;color:#fff;border:none;border-radius:6px;
    font:600 12px var(--sans);padding:3px 8px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
  .leaflet-tooltip.team::before{border-top-color:#1c1b19}
  .leaflet-popup-content{margin:12px 14px;font-family:var(--sans)}
  .pop{text-align:center;min-width:130px}
  .pop img{width:96px;border-radius:4px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .pop .nm{font-family:var(--serif);font-size:18px;font-weight:600;margin:8px 0 2px}
  .pop .cf{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .pop .badge{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;color:#fff;
    background:var(--accent);border-radius:20px;padding:2px 9px}
  .legend{background:var(--legend);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:12.5px;line-height:1.5;box-shadow:0 6px 20px rgba(0,0,0,.10)}
  .legend b{font-family:var(--serif);font-size:13px;display:block;margin-bottom:6px}
  .legend .row{display:flex;align-items:center;gap:7px;white-space:nowrap}
  .legend .sw{width:13px;height:13px;border-radius:3px;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15)}
  .legend .cnt{color:var(--muted)}
  .leaflet-control-attribution{font-size:10px}

  /* theme toggle button */
  .topright{position:absolute;top:14px;right:18px;display:flex;align-items:center;gap:12px}
  header.bar{position:relative}
  #themeBtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
    border:1px solid var(--line);border-radius:50%;background:var(--card);color:var(--ink-soft);
    cursor:pointer;font-size:15px;line-height:1;transition:border-color .15s,color .15s}
  #themeBtn:hover{border-color:var(--accent);color:var(--accent)}

  /* dark-mode: keep Leaflet popups & controls readable */
  html[data-theme="dark"] .leaflet-popup-content-wrapper,
  html[data-theme="dark"] .leaflet-popup-tip{background:var(--card);color:var(--ink)}
  html[data-theme="dark"] .leaflet-bar a{background:var(--card);color:var(--ink);border-color:var(--line)}
  html[data-theme="dark"] .leaflet-bar a:hover{background:var(--paper-2)}
  html[data-theme="dark"] .leaflet-control-attribution{background:rgba(21,19,15,.75)!important;color:var(--muted)}
  html[data-theme="dark"] .leaflet-control-attribution a{color:var(--accent-ink)}

  @media(max-width:560px){header.bar h1{font-size:21px}header.bar h1 .sub{display:none}.legend{display:none}
    .topright{top:12px;right:14px;gap:8px}}
</style>
<script>
  // set theme before paint to avoid a flash
  (function(){
    try{
      var q = new URLSearchParams(location.search).get('theme');
      var t = q || localStorage.getItem('wc-theme')
        || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    }catch(e){}
  })();
</script>
</head>
<body>

<header class="bar">
  <div class="topright">
    <button id="themeBtn" title="Toggle light / dark" aria-label="Toggle light or dark theme">🌙</button>
  </div>
  <p class="role">FIFA World Cup 2026 · USA · Canada · Mexico</p>
  <h1>Map, Groups &amp; Live Scores<span class="sub">48 teams · 12 groups · live tables</span></h1>
</header>

<div class="livewrap">
  <div id="liveBar" class="idle"><span class="tag"><span class="dot"></span>Loading live scores…</span></div>
</div>

<div id="map"></div>

<div id="finalsBar" hidden></div>

<section class="groups-wrap">
  <div class="tabs">
    <button class="tab active" data-tab="groups">Group stage</button>
    <button class="tab" data-tab="schedule">Schedule</button>
    <button class="tab" data-tab="country">Country stats</button>
    <button class="tab" data-tab="stats">Player stats</button>
    <button class="tab" data-tab="news">News</button>
    <span class="upd" id="updated"></span>
  </div>
  <div class="groups tabpane" id="groups" data-pane="groups">
    <div class="state-note">Loading group standings…</div>
  </div>
  <div class="tabpane" id="schedulePane" data-pane="schedule" hidden>
    <div class="state-note">Loading match schedule…</div>
  </div>
  <div class="tabpane" id="countryPane" data-pane="country" hidden>
    <div class="state-note">Loading country stats…</div>
  </div>
  <div class="tabpane" id="statsPane" data-pane="stats" hidden>
    <div class="psearch">
      <input id="pSearchInput" type="search" autocomplete="off" placeholder="🔍 Search any player — e.g. Messi, Harry Kane, Vinícius…">
      <button id="pSearchBtn">Search</button>
    </div>
    <div id="pSearchResults" class="psr" hidden></div>
    <div id="statsContent"><div class="state-note">Loading player stats…</div></div>
  </div>
  <div class="tabpane" id="newsPane" data-pane="news" hidden>
    <div class="state-note">Loading World Cup news…</div>
  </div>
</section>

<!-- floating player info window -->
<div id="playerModal" class="smodal" hidden>
  <div class="sbox pbox">
    <button class="sclose" onclick="closePlayer()" aria-label="Close">×</button>
    <div class="pphoto" id="pPhoto"></div>
    <div class="pinfo">
      <h3 id="pName"></h3>
      <p class="ploc" id="pMeta">Loading…</p>
      <div class="pstats" id="pStats"></div>
      <p class="pextract" id="pExtract"></p>
      <a class="pwiki" id="pWiki" target="_blank" rel="noopener noreferrer" hidden>Read more on Wikipedia ↗</a>
      <div class="pclubs" id="pClubs" hidden></div>
    </div>
  </div>
</div>

<!-- floating stadium info window -->
<div id="stadiumModal" class="smodal" hidden>
  <div class="sbox">
    <button class="sclose" onclick="closeStadium()" aria-label="Close">×</button>
    <div class="simg" id="sImg"></div>
    <div class="sbody">
      <h3 id="sName"></h3>
      <p class="sloc" id="sLoc"></p>
      <div class="sstats" id="sStats"></div>
      <p class="smatch" id="sMatch"></p>
      <div class="sscorers" id="sSchedule"></div>
      <div class="sscorers" id="sScorers"></div>
    </div>
  </div>
</div>

<script>
/* ───────── Map: 48 qualified teams ───────── */
const CONF = {
  host:'Host nation', uefa:'UEFA — Europe', conmebol:'CONMEBOL — S. America',
  caf:'CAF — Africa', afc:'AFC — Asia', concacaf:'CONCACAF — N./C. America', ofc:'OFC — Oceania'
};
const TEAMS = [
  ['United States','us',39.0,-98.0,'host'],['Canada','ca',58.0,-106.0,'host'],['Mexico','mx',23.6,-102.0,'host'],
  ['Austria','at',47.6,14.5,'uefa'],['Belgium','be',50.6,4.6,'uefa'],['Bosnia & Herzegovina','ba',43.9,17.7,'uefa'],
  ['Croatia','hr',45.1,16.2,'uefa'],['Czechia','cz',49.8,15.5,'uefa'],['England','gb-eng',52.6,-1.4,'uefa'],
  ['France','fr',46.6,2.4,'uefa'],['Germany','de',51.2,10.4,'uefa'],['Netherlands','nl',52.2,5.5,'uefa'],
  ['Norway','no',61.5,9.5,'uefa'],['Portugal','pt',39.6,-8.2,'uefa'],['Scotland','gb-sct',56.7,-4.2,'uefa'],
  ['Spain','es',40.2,-3.7,'uefa'],['Sweden','se',62.0,15.5,'uefa'],['Switzerland','ch',46.8,8.2,'uefa'],
  ['Türkiye','tr',39.0,35.2,'uefa'],
  ['Argentina','ar',-35.0,-64.0,'conmebol'],['Brazil','br',-10.5,-52.0,'conmebol'],['Colombia','co',4.0,-73.0,'conmebol'],
  ['Ecuador','ec',-1.4,-78.4,'conmebol'],['Paraguay','py',-23.4,-58.4,'conmebol'],['Uruguay','uy',-33.0,-56.0,'conmebol'],
  ['Algeria','dz',28.0,2.6,'caf'],['Cape Verde','cv',16.0,-24.0,'caf'],['DR Congo','cd',-2.9,23.6,'caf'],
  ["Côte d'Ivoire",'ci',7.6,-5.5,'caf'],['Egypt','eg',26.8,30.8,'caf'],['Ghana','gh',7.9,-1.0,'caf'],
  ['Morocco','ma',31.8,-7.0,'caf'],['Senegal','sn',14.5,-14.5,'caf'],['South Africa','za',-29.0,24.5,'caf'],
  ['Tunisia','tn',34.0,9.5,'caf'],
  ['Australia','au',-25.0,134.0,'afc'],['Iran','ir',32.4,53.7,'afc'],['Iraq','iq',33.2,43.7,'afc'],
  ['Japan','jp',36.2,138.3,'afc'],['Jordan','jo',31.2,36.5,'afc'],['South Korea','kr',36.5,127.9,'afc'],
  ['Qatar','qa',25.3,51.2,'afc'],['Saudi Arabia','sa',24.0,45.0,'afc'],['Uzbekistan','uz',41.4,64.6,'afc'],
  ['Curaçao','cw',12.2,-69.0,'concacaf'],['Haiti','ht',19.1,-72.3,'concacaf'],['Panama','pa',8.5,-80.1,'concacaf'],
  ['New Zealand','nz',-41.5,173.0,'ofc'],
];

const map = L.map('map',{worldCopyJump:true,minZoom:2,maxZoom:6}).setView([24,5],2);
map.setMaxBounds([[-85,-200],[85,200]]);
const ESRI_ATTR = 'Tiles &copy; Esri — Esri, HERE, Garmin, &copy; OpenStreetMap contributors';
const tileLight = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',{attribution:ESRI_ATTR, maxZoom:6});
const tileDark  = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}',{attribution:ESRI_ATTR, maxZoom:6});
function applyMapTiles(theme){
  const on = theme==='dark' ? tileDark : tileLight, off = theme==='dark' ? tileLight : tileDark;
  if(map.hasLayer(off)) map.removeLayer(off);
  if(!map.hasLayer(on)) on.addTo(map);
}
applyMapTiles(document.documentElement.getAttribute('data-theme'));

// normalize team names so API names (e.g. "Korea Republic") match map markers
const ALIAS = {
  korearepublic:'southkorea', republicofkorea:'southkorea', koreasouth:'southkorea',
  iriran:'iran',
  caboverde:'capeverde',
  congodr:'drcongo', congodrc:'drcongo', democraticrepublicofthecongo:'drcongo',
  bosniaandherzegovina:'bosniaherzegovina',
  turkey:'turkiye',
  czechrepublic:'czechia',
  ivorycoast:'cotedivoire',
  usa:'unitedstates', unitedstatesofamerica:'unitedstates', us:'unitedstates',
};
function norm(s){
  const k = String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'')
    .toLowerCase().replace(/[^a-z0-9]/g,'');
  return ALIAS[k] || k;
}
const markersByName = {}; // norm(name) -> { marker, iso, name }
const teamLayer = L.layerGroup().addTo(map); // toggled off in "Stadiums" view

TEAMS.forEach(([name,iso,lat,lng,conf])=>{
  const host = conf==='host';
  const icon = L.divIcon({className:'',
    html:`<div class="flag-marker conf-${conf}${host?' host':''}"><img src="https://flagcdn.com/w40/${iso}.png" alt="${name} flag" loading="lazy"></div>`,
    iconSize: host?[34,24]:[30,21], iconAnchor: host?[17,12]:[15,10], popupAnchor:[0,-12]});
  const mk = L.marker([lat,lng],{icon,title:name})
   .bindTooltip(name,{className:'team',direction:'top',offset:[0,-8]})
   .bindPopup(`<div class="pop"><img src="https://flagcdn.com/w160/${iso}.png" alt="${name} flag">`
     +`<div class="nm">${name}</div><div class="cf">${CONF[conf]}</div>`
     +(host?'<div class="badge">HOST 2026</div>':'')+`</div>`).addTo(teamLayer);
  markersByName[norm(name)] = {marker:mk, iso, name};
});

const counts = TEAMS.reduce((a,[,,,,c])=>(a[c]=(a[c]||0)+1,a),{});
const legend = L.control({position:'bottomright'});
legend.onAdd = () => { const d = L.DomUtil.create('div','legend');
  d.innerHTML = '<b>48 qualified teams</b>' + Object.keys(CONF).map(c =>
    `<div class="row"><span class="sw" style="background:var(--c-${c})"></span><span>${CONF[c]}</span> <span class="cnt">· ${counts[c]||0}</span></div>`).join('');
  return d; };
legend.addTo(map);

/* ───────── World Cup 2026 host stadiums (for the live venue) ───────── */
// api-football gives venue {id,name,city} but no coordinates, so we keep a
// static table of the 16 host venues. Matched by stadium name, then city.
const STADIUMS = [
  {n:'MetLife Stadium', city:'East Rutherford', country:'USA', cap:82500, lat:40.8135, lng:-74.0745, alias:['new york new jersey stadium','new york stadium']},
  {n:'AT&T Stadium', city:'Arlington', country:'USA', cap:80000, lat:32.7473, lng:-97.0945, alias:['dallas stadium','att stadium','cowboys stadium']},
  {n:'NRG Stadium', city:'Houston', country:'USA', cap:72220, lat:29.6847, lng:-95.4107, alias:['houston stadium']},
  {n:'Arrowhead Stadium', city:'Kansas City', country:'USA', cap:76416, lat:39.0489, lng:-94.4839, alias:['geha field at arrowhead stadium','kansas city stadium']},
  {n:'Mercedes-Benz Stadium', city:'Atlanta', country:'USA', cap:71000, lat:33.7553, lng:-84.4006, alias:['atlanta stadium']},
  {n:'Hard Rock Stadium', city:'Miami Gardens', country:'USA', cap:65326, lat:25.9580, lng:-80.2389, alias:['miami stadium']},
  {n:'Lincoln Financial Field', city:'Philadelphia', country:'USA', cap:69176, lat:39.9008, lng:-75.1675, alias:['philadelphia stadium']},
  {n:'Gillette Stadium', city:'Foxborough', country:'USA', cap:65878, lat:42.0909, lng:-71.2643, alias:['boston stadium','new england stadium']},
  {n:'Lumen Field', city:'Seattle', country:'USA', cap:69000, lat:47.5952, lng:-122.3316, alias:['seattle stadium','centurylink field']},
  {n:"Levi's Stadium", city:'Santa Clara', country:'USA', cap:68500, lat:37.4033, lng:-121.9694, alias:['san francisco bay area stadium','san francisco stadium','bay area stadium']},
  {n:'SoFi Stadium', city:'Inglewood', country:'USA', cap:70240, lat:33.9535, lng:-118.3392, alias:['los angeles stadium']},
  {n:'BMO Field', city:'Toronto', country:'Canada', cap:45000, lat:43.6332, lng:-79.4185, alias:['toronto stadium']},
  {n:'BC Place', city:'Vancouver', country:'Canada', cap:54500, lat:49.2768, lng:-123.1119, alias:['vancouver stadium']},
  {n:'Estadio Azteca', city:'Mexico City', country:'Mexico', cap:83264, lat:19.3029, lng:-99.1505, alias:['estadio banorte','mexico city stadium']},
  {n:'Estadio Akron', city:'Guadalajara', country:'Mexico', cap:49850, lat:20.6817, lng:-103.4625, alias:['guadalajara stadium']},
  {n:'Estadio BBVA', city:'Monterrey', country:'Mexico', cap:53500, lat:25.6693, lng:-100.2443, alias:['estadio bbva bancomer','monterrey stadium']},
];
const stadiumByName = {}, stadiumByCity = {};
STADIUMS.forEach(s=>{
  stadiumByName[norm(s.n)] = s;
  (s.alias||[]).forEach(a=> stadiumByName[norm(a)] = s);
  stadiumByCity[norm(s.city)] = s;
});
function venueInfo(v){
  if(!v) return null;
  let s = stadiumByName[norm(v.name)] || stadiumByCity[norm(v.city)]
       || stadiumByCity[norm(String(v.city).split(',')[0])] || null;
  const img = v.id ? `https://media.api-sports.io/football/venues/${v.id}.png` : '';
  return { s, img, name: v.name || (s&&s.n) || 'Stadium', city: v.city || (s&&s.city) || '' };
}

// Resolve a (possibly short/aliased) team name to one of the 48 known team keys.
const TEAM_NORMS = Object.keys(markersByName);
function canonTeam(name){
  const k = norm(name);
  if(markersByName[k]) return k;
  if(k.length >= 4){
    const hit = TEAM_NORMS.find(t => t.startsWith(k) || k.startsWith(t));
    if(hit) return hit;
  }
  return k;
}

// resolve any match to a host stadium: explicit feed venue first, then the
// built-in fixture map by team pair.
function matchStadium(m){
  if(!m) return null;
  if(m.venue){
    const vi = venueInfo(typeof m.venue==='string' ? {name:m.venue} : m.venue);
    if(vi && vi.s) return vi.s;
  }
  if(m.home && m.away){
    const a = canonTeam(m.home.name), b = canonTeam(m.away.name);
    const n = FIXTURE_VENUES[a+'|'+b] || FIXTURE_VENUES[b+'|'+a];
    if(n){ const s = stadiumByName[norm(n)]; if(s) return s; }
  }
  return null;
}

// in "Stadiums" view, highlight the host stadium of each live game + show its score
function renderStadiumLive(live){
  (live||[]).forEach(m=>{
    const s = matchStadium(m); if(!s) return;
    const sm = stadiumMarkers[norm(s.n)]; if(!sm) return;
    const el = sm.marker._icon; if(el){ el.classList.add('live-stadium'); liveStadiumEls.push(el); }
    const goal = isFreshGoal(m);
    const pill = L.divIcon({className:'', iconSize:null,
      html:`<div class="pill-wrap"><div class="live-score-pill${goal?' goal':''}">`
        +`<span class="sc">${fmtScore(m.home.score)}–${fmtScore(m.away.score)}</span>`
        +`<span class="lv">${goal?'⚽ GOAL!':liveState(m)}</span></div></div>`});
    L.marker([s.lat,s.lng],{icon:pill,zIndexOffset:1500})
      .on('click', ()=> openStadiumVenue(s)).addTo(liveLayer);
  });
}

function renderMapLive(live){
  clearMapLive();
  if(mapView==='stadiums'){ renderStadiumLive(live); return; }
  (live||[]).forEach(m=>{
    const h = markersByName[canonTeam(m.home.name)], a = markersByName[canonTeam(m.away.name)];
    if(!h || !a) return;
    const hp = h.marker.getLatLng(), ap = a.marker.getLatLng();

    // connecting line between the two countries
    L.polyline([hp,ap],{color:'#d6422b',weight:2.5,opacity:.85,dashArray:'6 8',className:'liveline'}).addTo(liveLayer);

    // highlight both country markers
    [h,a].forEach(t=>{ const el=t.marker._icon; if(el){ el.classList.add('live-marker'); liveMarked.push(el); } });

    // live score pill at the midpoint
    const mid = [(hp.lat+ap.lat)/2, (hp.lng+ap.lng)/2];
    const goal = isFreshGoal(m);
    const lv = goal ? '⚽ GOAL!' : liveState(m);
    const pill = L.divIcon({className:'', iconSize:null,
      html:`<div class="pill-wrap"><div class="live-score-pill${goal?' goal':''}">`
        +`<img src="${flagUrl(h.iso)}" alt=""><span class="sc">${fmtScore(m.home.score)}–${fmtScore(m.away.score)}</span>`
        +`<img src="${flagUrl(a.iso)}" alt=""><span class="lv">${lv}</span></div></div>`});
    L.marker(mid,{icon:pill,zIndexOffset:1000})
      .on('click',()=>map.flyToBounds(L.latLngBounds([hp,ap]).pad(0.6),{maxZoom:5}))
      .addTo(liveLayer);

    // stadium marker at the live venue (when we know its coordinates)
    const vi = venueInfo(m.venue);
    if(vi && vi.s){
      const sicon = L.divIcon({className:'', iconSize:[34,34], iconAnchor:[17,34], popupAnchor:[0,-30],
        html:`<div class="stadium-marker" title="${esc(vi.name)} — click for info">🏟️</div>`});
      L.marker([vi.s.lat, vi.s.lng],{icon:sicon, zIndexOffset:1400})
        .on('click',()=>openStadium(m)).addTo(liveLayer);
    }
  });
}

TEAMS.forEach(([name,iso])=> isoByCountry[norm(name)] = iso);

const esc = s => String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const liveBar = document.getElementById('liveBar');
const finalsBar = document.getElementById('finalsBar');
const groupsEl = document.getElementById('groups');
const updEl = document.getElementById('updated');

function fmtScore(n){ return (n===null||n===undefined) ? '–' : n; }

// goal detection: flash when a live score increments between polls
let currentLive = [];
const prevScore = {}, goalAt = {};
const gkey = m => norm(m.home.name)+'|'+norm(m.away.name);
function goalCheck(live){
  const now = Date.now();
  (live||[]).forEach(m=>{
    if(m.home.score==null || m.away.score==null) return;
    const k = gkey(m), s = `${m.home.score}-${m.away.score}`;
    if(prevScore[k]!==undefined && s!==prevScore[k]){
      const [ph,pa] = prevScore[k].split('-').map(Number);
      if((m.home.score+m.away.score) > (ph+pa)) goalAt[k] = now; // a goal went in
    }
    prevScore[k] = s;
  });
}
const isFreshGoal = m => { const t = goalAt[gkey(m)]; return t && (Date.now()-t < 10000); };

function liveState(m){
  if(m.phase==='HT') return 'HT';
  if(['FT','AET','PEN'].includes(m.phase)) return 'FT';
  if(m.minute!=null) return `${esc(m.minute)}'`;
  if(m.status==='PAUSED') return 'HT';
  return 'LIVE';
}

function liveCard(m,i){
  const goal = isFreshGoal(m);
  const vi = venueInfo(m.venue);
  const vchip = vi ? `<span class="vchip" title="Stadium info" onclick="event.stopPropagation();openStadiumByIdx(${i})">🏟️ ${esc(vi.name)}</span>` : '';
  return `<span class="lgame tap${goal?' goal':''}" title="Show on map" data-h="${esc(m.home.name)}" data-a="${esc(m.away.name)}"`
    + ` onclick="focusLiveMatch(this.dataset.h,this.dataset.a)">`
    + teamCard(m.home,false)
    + `<span class="sc">${fmtScore(m.home.score)}–${fmtScore(m.away.score)}</span>`
    + teamCard(m.away,true)
    + (goal?`<span class="goalbadge">⚽ GOAL!</span>`:`<span class="min">${liveState(m)}</span>`)
    + (m.group?`<span class="grp">Grp ${esc(m.group)}</span>`:'') + vchip + `</span>`;
}
function scheduledCard(m){
  const t = new Date(m.utcDate).toLocaleString([], {weekday:'short',hour:'2-digit',minute:'2-digit'});
  return `<span class="lgame tap" title="Show on map" data-h="${esc(m.home.name)}" data-a="${esc(m.away.name)}"`
    + ` onclick="focusLiveMatch(this.dataset.h,this.dataset.a)">`
    + teamCard(m.home,false) + `<span class="sc">${esc(t)}</span>` + teamCard(m.away,true)
    + (m.group?`<span class="grp">Grp ${esc(m.group)}</span>`:'') + `</span>`;
}
function finalCard(m){
  return `<span class="lgame tap" title="Show on map" data-h="${esc(m.home.name)}" data-a="${esc(m.away.name)}"`
    + ` onclick="focusLiveMatch(this.dataset.h,this.dataset.a)">`

    + `<span class="sc">${fmtScore(m.home.score)}–${fmtScore(m.away.score)}</span>`

    + (m.group?`<span class="grp">Grp ${esc(m.group)}</span>`:'') + `</span>`;
}
function renderLive(live, matches){
  const finished = (matches||[]).filter(m => m.status==='FINISHED')
    .sort((a,b)=> new Date(b.utcDate)-new Date(a.utcDate));
  const nextM = (matches||[]).filter(m => m.status==='TIMED' || m.status==='SCHEDULED')
    .sort((a,b)=> new Date(a.utcDate)-new Date(b.utcDate))[0];

  // Top bar: only the live game(s) and the next upcoming game.
  let html = '';
  if(live.length){
    liveBar.className = ''; currentLive = live;
    html += `<span class="tag"><span class="dot"></span>Live now</span>` + live.map((m,i)=>liveCard(m,i)).join('');
  } else {
    liveBar.className = 'idle'; currentLive = [];
    html += `<span class="tag">No match live</span>`;
  }
  if(nextM){ html += `<span class="seg">Next live</span>` + scheduledCard(nextM); }
  if(!live.length && !nextM){ html = `<span class="tag">No live or upcoming match</span>`; }
  liveBar.innerHTML = html;

  // Completed games go in their own strip below the map.
  if(finished.length){
    finalsBar.hidden = false;
    finalsBar.innerHTML = `<span class="seg">Final scores</span>` + finished.map(finalCard).join('');
  } else {
    finalsBar.hidden = true;
    finalsBar.innerHTML = '';
  }
}

function renderGroups(groups, live){
  lastGroups = groups || [];

  if(!groups.length){

    return;

  groupsEl.innerHTML = groups.map(g=>{
    const live = liveByGroup.has(g.letter);
    const rows = g.table.map(r=>{
      const adv = r.position<=2 ? ' class="adv"' : '';
      const crest = r.crest?`<img src="${esc(r.crest)}" alt="">`:`<img src="" alt="" style="visibility:hidden">`;
      return `<tr${adv}><td class="tm"><span class="pos">${r.position}</span>${crest}<span class="nm">${esc(r.name)}</span></td>`
        + `<td>${r.played}</td><td>${r.won}</td><td>${r.draw}</td><td>${r.lost}</td>`
        + `<td>${r.gd>0?'+':''}${r.gd}</td><td class="pts">${r.points}</td></tr>`;
    }).join('');
    return `<div class="gcard${live?' haslive':''}">`
      + `<div class="gh"><b>Group ${esc(g.letter)}</b>`
      + (live?`<span class="livechip"><span class="dot"></span>LIVE</span>`:'') + `</div>`
      + `<table class="std"><thead><tr><th class="tm">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>`
      + `<tbody>${rows}</tbody></table></div>`;
  }).join('');
}

const LIVE_ALL = ['LIVE','IN_PLAY','PAUSED'];
function renderSchedule(matches){
  const pane = panes.schedule;
  const list = (matches||[]).filter(m=>m.utcDate).slice()
    .sort((a,b)=> new Date(a.utcDate)-new Date(b.utcDate));
  if(!list.length){
    pane.innerHTML = `<div class="state-note">No fixtures published yet. They’ll appear here once the schedule is available from the data feed.</div>`;
    return;
  }
  // the "next" game = earliest match that hasn't started and isn't live
  const nextMatch = list.find(m=> !LIVE_ALL.includes(m.status) && m.status!=='FINISHED') || null;
  // bucket by local calendar day
  const days = [];
  let cur = null;
  list.forEach(m=>{
    const d = new Date(m.utcDate);
    const key = d.toDateString();
    if(!cur || cur.key!==key){ cur = {key, date:d, games:[]}; days.push(cur); }
    cur.games.push(m);
  });
  const dayFmt = {weekday:'long', month:'long', day:'numeric'};
  const timeFmt = {hour:'2-digit', minute:'2-digit'};
  pane.innerHTML = `<div class="sched">` + days.map(day=>{
    const rows = day.games.map(m=>{
      const live = LIVE_ALL.includes(m.status);
      const finished = m.status==='FINISHED';
      const isNext = m===nextMatch;
      const played = live || finished;
      const time = new Date(m.utcDate).toLocaleTimeString([], timeFmt);
      const score = played
        ? `${fmtScore(m.home.score)}–${fmtScore(m.away.score)}`
        : `<span class="svs">vs</span>`;
      const stat = live ? `<span class="sstat lv">${m.minute!=null?esc(m.minute)+"'":'Live'}</span>`
                 : (finished ? `<span class="sstat">FT</span>`
                 : (isNext ? `<span class="sstat nx">▶ NEXT</span>` : `<span class="sstat">${esc(time)}</span>`));
      const hc = m.home.crest ? `<img class="screst" src="${esc(m.home.crest)}" alt="">` : '';
      const ac = m.away.crest ? `<img class="screst" src="${esc(m.away.crest)}" alt="">` : '';
      const cls = `srow${live?' live':''}${isNext?' next':''}`;
      return `<div class="${cls}" data-h="${esc(m.home.name)}" data-a="${esc(m.away.name)}"`
        + ` title="Show on map" onclick="focusLiveMatch(this.dataset.h,this.dataset.a)">`
        + (live?`<span class="sflag live">● LIVE</span>`:(isNext?`<span class="sflag next">NEXT UP</span>`:''))
        + `<span class="stime">${esc(time)}${m.group?`<span class="sgrp">Grp ${esc(m.group)}</span>`:''}</span>`
        + `<span class="sh"><span class="snm">${esc(m.home.name)}</span>${hc}</span>`
        + `<span class="sscore">${score}</span>`
        + `<span class="sa">${ac}<span class="snm">${esc(m.away.name)}</span></span>`
        + stat + `</div>`;
    }).join('');

// Set the stadium photo: show any api-football venue image immediately, then
// upgrade to a Wikipedia photo (cached per stadium on first open). A sequence
// guard stops a slow fetch from overwriting the image after another stadium
// was opened.
let stadiumPhotoSeq = 0;
async function setStadiumPhoto(stadium, fallbackImg){
  const img = document.getElementById('sImg');
  const seq = ++stadiumPhotoSeq;
  const apply = url => {
    if(seq !== stadiumPhotoSeq || sModal.hidden) return;
    if(url){ img.style.backgroundImage = `url("${url}")`; img.classList.remove('noimg'); }
    else { img.style.backgroundImage = 'none'; img.classList.add('noimg'); }
  };
  apply(fallbackImg || '');
  if(!stadium) return;
  if(stadium._photo === undefined){
    try{
      const wb = await fetch(`/api/wiki?q=${encodeURIComponent(stadium.n)}&kind=stadium`).then(r=>r.json());
      stadium._photo = (((wb.results||[])[0]) || {}).thumbnail || '';
    }catch(e){ stadium._photo = ''; }
  }
  apply(stadium._photo || fallbackImg || '');
}

async function loadScorers(m){

function timeAgo(d){
  if(!d) return '';
  const t = new Date(d).getTime(); if(isNaN(t)) return '';
  const s = Math.max(0, (Date.now()-t)/1000);
  if(s<3600) return Math.round(s/60)+'m ago';
  if(s<86400) return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}

    + `<table class="rtable"><tbody>` + rows.map((r,i)=>{
        const last = is2026Active(r.name) ? 2026 : r.last;
        const sub = `${esc(r.team)}${last?` · WC ${last}`:''}`;
        return `<tr><td class="hrk">${i+1}</td>`
        + `<td class="hpl"><span class="plink" data-name="${esc(r.name)}" data-nat="${esc(r.team)}" data-val="${esc(String(r.val))}" data-unit="${esc(unit)}" onclick="openPlayer(this)">`
        + `${flagImg(r.iso)}<span class="hnm">${esc(r.name)}<small>${sub}</small></span></span></td>`
        + `<td class="hv">${r.val}${r.delta?`<span class="dlt">+${r.delta}</span>`:''}<small>${esc(unit)}</small></td></tr>`;
      }).join('') + `</tbody></table></div>`;
}
// merge a [name,iso,country,base,lastWC] table with live 2026 numbers (by name)
function mergeLive(base, live2026){
  const map = {};
  const rows = base.map(([name,iso,team,b,last])=>{ const p={name,iso,team,base:b,cur:0,last}; map[norm(name)]=p; return p; });
  Object.entries(live2026).forEach(([k,v])=>{
    if(k==='__meta') return;
    if(map[k]) map[k].cur = v;
    else { const meta = live2026.__meta && live2026.__meta[k]; if(meta){ const p={name:meta.name,iso:meta.iso,team:meta.team,base:0,cur:v,last:2026}; rows.push(p); map[k]=p; } }
  });
  rows.forEach(p=>{ p.val = p.base + p.cur; p.delta = p.cur || 0; });
  return rows.filter(p=>p.val>0).sort((a,b)=> b.val-a.val);
}
function renderHistorical(){
  // build 2026 lookups (with metadata so feed-only players can be added)
  const g = {__meta:{}}, a = {__meta:{}};
  lastScorers.forEach(s=>{
    const k = norm(s.name), meta = {name:s.name, iso:isoByCountry[norm(s.nationality)]||'', team:s.team};
    g[k] = s.goals; g.__meta[k] = meta;
    if(s.assists!=null){ a[k] = s.assists; a.__meta[k] = meta; }
  });
  let goalsRows;
  if(wcRecords && wcRecords.topScorers && wcRecords.topScorers.length){
    const cur = {}; lastScorers.forEach(s=> cur[norm(s.name)] = s.goals);
    goalsRows = wcRecords.topScorers.slice(0,12).map(s=>(
      {name:s.player, iso:recIso(s.team), team:s.team, val:s.goals, last:s.last, delta: cur[norm(s.player)]||0}));
  } else {
    goalsRows = mergeLive(WC_GOALS_BASE, g).slice(0,12);
  }
  const assistRows = mergeLive(WC_ASSISTS_BASE, a).slice(0,8);

  // single-tournament: historical tallies + each current 2026 scorer's running total
  const st = WC_SINGLE_TOURN.map(([name,iso,team,val,year])=>({name,iso,team,val,last:year}));
  lastScorers.slice(0,8).forEach(s=> st.push({name:s.name, iso:isoByCountry[norm(s.nationality)]||'', team:s.team, val:s.goals, last:2026}));
  const stRows = st.sort((a,b)=> b.val-a.val).slice(0,6);

  let html = `<p class="statnote">All-time men’s World Cup records, with each player’s last World Cup. Goals, assists and single-tournament tallies update live with the 2026 feed (look for <b>incl. 2026</b>). Tap a name for the player card. Appearances &amp; clean sheets are as of 2022.</p><div class="histgrid">`;
  html += recordCard('⚽ All-time top scorers', 'goals', goalsRows, {live:true});
  html += recordCard('🎯 Most goals, single tournament', 'goals', stRows, {live:true});
  html += recordCard('👟 Most assists', 'assists', assistRows, {live:true, note:'FIFA-credited; older assists are estimates'});
  WC_STATIC.forEach(c=> html += recordCard(c.title, c.unit,
    c.rows.map(([name,iso,team,val,last])=>({name,iso,team,val,last})), {tag:'as of 2022', note:c.note}));
  return html + `</div>`;
}

/* ───────── Player floating window ───────── */
const pModal = document.getElementById('playerModal');
const pPhoto = document.getElementById('pPhoto');
function pstat(v,l){ return `<span class="pstat"><b>${esc(String(v))}</b>${esc(l)}</span>`; }
async function openPlayer(el){
  const d = el.dataset;
  const name = d.name;
  pModal.hidden = false;
  pModal.querySelector('.sbox').scrollTop = 0;
  document.getElementById('pName').textContent = name;
  document.getElementById('pMeta').textContent = (d.nat || d.team || '') + ' · loading…';
  pPhoto.style.backgroundImage = 'none'; pPhoto.classList.add('noimg');
  const clubsEl = document.getElementById('pClubs'); clubsEl.hidden = true; clubsEl.innerHTML = '';
  const extractEl = document.getElementById('pExtract'); extractEl.textContent = '';
  const wikiEl = document.getElementById('pWiki'); wikiEl.hidden = true; wikiEl.removeAttribute('href');
  const chips = [];
  if(d.g!=null && d.g!=='') chips.push(pstat(d.g, '2026 goals'));
  if(d.a!=null && d.a!=='' && d.a!=='null') chips.push(pstat(d.a, '2026 assists'));
  if(d.alltime) chips.push(pstat(d.alltime, 'all-time WC goals'));
  if(d.val && d.unit) chips.push(pstat(d.val, d.unit));
  document.getElementById('pStats').innerHTML = chips.join('');

  // Wikipedia only — free & unlimited, so we save the api-football quota for
  // live game info. (Photo, bio summary and link all come from Wikipedia.)
  let wiki = null;
  try{
    const wb = await fetch(`/api/wiki?q=${encodeURIComponent(name)}`).then(r=>r.json());
    if(pModal.hidden) return; // closed meanwhile
    wiki = (wb.results || [])[0] || null;
  }catch(e){ /* handled below */ }

  if(wiki && wiki.thumbnail){ pPhoto.style.backgroundImage = `url('${wiki.thumbnail}')`; pPhoto.classList.remove('noimg'); }
  document.getElementById('pMeta').textContent = (wiki && wiki.description) || d.nat || d.team || 'No Wikipedia profile found';
  if(wiki){
    if(wiki.extract) extractEl.textContent = wiki.extract;
    if(wiki.url){ wikiEl.hidden = false; wikiEl.href = wiki.url; }
  }
}
function closePlayer(){ pModal.hidden = true; }
pModal.addEventListener('click', e=>{ if(e.target===pModal) closePlayer(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePlayer(); });
window.openPlayer = openPlayer; window.closePlayer = closePlayer;

async function refresh(){
  try{
    const r = await fetch('/api/wc', {cache:'no-store'});
    const data = await r.json();
    if(data.error){
      clearMapLive();
      liveBar.className='idle';
      liveBar.innerHTML = `<span class="tag">Live data unavailable</span>`;
      groupsEl.innerHTML = data.error==='missing_token'
        ? `<div class="state-note"><b>Live feed not configured yet.</b><br>Set the football-data.org API token on the Worker:<br>
           <code>npx wrangler secret put FOOTBALL_DATA_TOKEN</code> (and add it to <code>.dev.vars</code> for local dev), then redeploy.
           The map above works without it.</div>`
        : `<div class="state-note">Couldn’t load standings right now (<code>${esc(data.error)}</code>). Will retry automatically.</div>`;
      return;
    }
    goalCheck(data.live||[]);
    renderLive(data.live||[], data.matches||[]);
    renderGroups(data.groups||[], data.live||[]);
    lastMatches = data.matches||[];
    renderSchedule(data.matches||[]);
    renderMapLive(data.live||[]);
    renderStats(data.scorers||[]);
    renderCountry(data.groups||[]);
    if(data.updated){
      const t = new Date(data.updated).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const src = data.source==='api-football' ? ' · live via api-football'
                : (data.live&&data.live.length ? ' · live (delayed feed)' : '');
      updEl.textContent = 'Updated ' + t + src + ' · auto-refreshes';
    }
  }catch(e){
    liveBar.className='idle';
    liveBar.innerHTML = `<span class="tag">Offline — retrying…</span>`;
  }
}
refresh();
setInterval(refresh, 30000); // poll every 30s
loadRecords(); // Wikipedia all-time records (once)
</script>
